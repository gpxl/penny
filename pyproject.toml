[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "naenae"
version = "0.1.0"
description = "Claude Max Capacity Monitor — macOS menu bar app"
requires-python = ">=3.9"
dependencies = [
    "rumps>=0.4.0",
    "pyyaml>=6.0",
]

[project.scripts]
naenae = "naenae.app:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["naenae*"]

[tool.setuptools.package-data]
naenae = []
