name: Bug Report
description: Report a bug in Penny
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open Penny
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.3"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of `python3 --version`"
      placeholder: "e.g. Python 3.12.4"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - curl one-liner
        - pipx
        - Homebrew
        - Manual / other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: "Paste from `~/.penny/logs/launchd.log` if applicable."
      render: shell
